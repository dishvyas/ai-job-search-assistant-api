services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_job_search
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
    depends_on:
      - postgres
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/ai_job_search
    ports:
      - "8000:8000"

volumes:
  postgres_data:
